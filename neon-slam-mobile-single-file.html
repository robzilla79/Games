<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#22053d" />

<meta name="apple-mobile-web-app-title" content="Crown Circuit" />
<title>Crown Circuit: Queens of the Ring</title>
<style>
:root{
  --bg:#18042f; --bg2:#091633; --panel:rgba(18,14,46,.82); --panel2:rgba(255,255,255,.09);
  --text:#f8f7ff; --muted:#c5c8ea; --gold:#ffd46b; --pink:#ff4fd8; --cyan:#69e6ff; --mint:#67ffbd; --red:#ff6a88;
  --shadow:0 20px 60px rgba(0,0,0,.42);
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%;touch-action:manipulation}
body{margin:0;min-height:100vh;font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif;color:var(--text);background:
 radial-gradient(circle at 10% 12%,rgba(255,79,216,.22),transparent 18%),
 radial-gradient(circle at 86% 8%,rgba(105,230,255,.2),transparent 18%),
 radial-gradient(circle at 50% 120%,rgba(255,212,107,.12),transparent 30%),
 linear-gradient(155deg,var(--bg) 0%,var(--bg2) 58%,#26083b 100%);
 overflow-x:hidden;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
body::before{content:"";position:fixed;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(255,255,255,.03),transparent 22%,transparent 78%,rgba(255,255,255,.025));opacity:.8}
.header{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:22px clamp(14px,4vw,48px)}
.brand h1{margin:0;font-size:clamp(34px,6vw,72px);line-height:.84;letter-spacing:.05em;text-shadow:0 0 20px rgba(255,79,216,.4)}
.brand p{margin:8px 0 0;color:var(--gold);font-weight:800;letter-spacing:.16em;text-transform:uppercase;font-size:clamp(10px,2vw,15px)}
.crown-badge{display:grid;place-items:center;width:82px;height:82px;border-radius:24px;background:linear-gradient(135deg,var(--gold),#ff9b5e);color:#26083b;font-size:30px;font-weight:1000;box-shadow:0 0 0 6px rgba(255,255,255,.08),0 18px 34px rgba(255,155,94,.32)}
#app{max-width:1320px;margin:0 auto;padding:0 16px 44px}
.card{background:linear-gradient(180deg,rgba(28,21,63,.92),rgba(15,17,42,.92));border:1px solid rgba(255,255,255,.12);border-radius:28px;box-shadow:var(--shadow),inset 0 0 50px rgba(255,255,255,.03);padding:clamp(18px,2.5vw,30px);backdrop-filter:blur(10px)}
.hero-grid,.grid{display:grid;gap:18px}.hero-grid{grid-template-columns:minmax(320px,1.25fr) minmax(320px,.95fr)}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.grid.four{grid-template-columns:repeat(4,minmax(0,1fr))}
@media(max-width:980px){.hero-grid,.grid.two,.grid.three,.grid.four{grid-template-columns:1fr}}
.panel-title{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:14px}.panel-title h2,.panel-title h3{margin:0}
.pill{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.11);font-size:12px;font-weight:900;letter-spacing:.07em;text-transform:uppercase;color:var(--gold)}
label{display:block;margin:0 0 6px;color:var(--gold);font-weight:800;font-size:14px}
input,select,textarea{width:100%;background:rgba(5,8,22,.7);color:var(--text);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:12px 14px;font:inherit;outline:none;box-shadow:inset 0 0 0 1px rgba(255,255,255,.02)}
input[type="range"]{padding:0;height:40px;background:transparent;box-shadow:none;border:0}
input[type="color"]{padding:6px;min-height:50px}
textarea{min-height:90px;resize:vertical}
button{border:0;cursor:pointer;border-radius:18px;padding:12px 16px;font:inherit;font-weight:1000;letter-spacing:.03em;color:#22053d;background:linear-gradient(135deg,var(--gold),#ff9b5e);box-shadow:0 10px 24px rgba(255,155,94,.24);transition:transform .12s ease,filter .12s ease}
button:hover{transform:translateY(-2px);filter:saturate(1.08)}button:active{transform:translateY(2px)}button.secondary{color:var(--text);background:rgba(255,255,255,.08);box-shadow:none;border:1px solid rgba(255,255,255,.12)}button.danger{background:linear-gradient(135deg,var(--red),#ff9b5e)}
.notice{padding:14px 16px;border-radius:18px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:var(--muted);line-height:1.45}
.nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.kv{display:flex;flex-wrap:wrap;gap:10px}.footer-actions,.choice{display:flex;flex-wrap:wrap;gap:10px}
.small{font-size:12px;color:var(--muted)}
.stat{margin-top:14px}.stat b{display:flex;justify-content:space-between;gap:8px;margin-bottom:6px}.bar{height:12px;border-radius:999px;background:rgba(0,0,0,.4);overflow:hidden;border:1px solid rgba(255,255,255,.08)}.fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--gold))}
.row{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:14px 16px;border-radius:18px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);margin-bottom:10px}
.hero-stage{position:relative;overflow:hidden;min-height:620px;background:
 radial-gradient(circle at 50% 0,rgba(255,255,255,.12),transparent 36%),
 linear-gradient(180deg,rgba(255,255,255,.05),transparent 34%),
 linear-gradient(180deg,#2a1659 0%,#14082e 40%,#080d23 100%);
 border-radius:30px;border:1px solid rgba(255,255,255,.12)}
.hero-stage::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent 0 8%,rgba(105,230,255,.09) 8% 9%,transparent 9% 20%,rgba(255,79,216,.08) 20% 21%,transparent 21% 78%,rgba(255,212,107,.08) 78% 79%,transparent 79% 100%)}
.stage-floor{position:absolute;left:7%;right:7%;bottom:28px;height:180px;background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.03));border:2px solid rgba(255,255,255,.12);border-radius:26px;transform:perspective(840px) rotateX(62deg);box-shadow:0 26px 60px rgba(0,0,0,.42),0 0 28px rgba(105,230,255,.12)}
.ramp{position:absolute;left:37%;right:37%;top:70px;bottom:160px;border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,.04));box-shadow:0 0 0 2px rgba(255,255,255,.07),0 0 36px rgba(255,79,216,.13)}
.spotlight{position:absolute;top:-40px;width:38%;height:460px;filter:blur(0.5px);opacity:.5;background:linear-gradient(180deg,rgba(255,255,255,.4),transparent 72%);clip-path:polygon(40% 0,60% 0,100% 100%,0 100%)}
.spotlight.left{left:6%;transform:rotate(-10deg)}.spotlight.right{right:6%;transform:rotate(10deg)}
.preview-stack{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;padding-bottom:44px;pointer-events:none}
.preview-card{position:absolute;left:28px;top:28px;width:min(300px,42vw);padding:16px;border-radius:22px;background:linear-gradient(160deg,rgba(9,8,28,.82),rgba(31,10,60,.72));border:1px solid rgba(255,255,255,.1);box-shadow:var(--shadow)}
.preview-card h3{margin:6px 0 0;font-size:clamp(22px,3vw,34px)}.preview-card .alias{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--cyan);font-weight:800}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.tab-btn.active{background:linear-gradient(135deg,var(--pink),#8b6cff);color:white}
.tab-panel{display:none}.tab-panel.active{display:block}
.color-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.choice-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.choice-chip{padding:10px 12px;border-radius:16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);cursor:pointer;text-align:center;font-weight:800}.choice-chip.active{background:linear-gradient(135deg,rgba(255,79,216,.26),rgba(105,230,255,.2));border-color:rgba(255,255,255,.25)}
.match-screen{display:grid;grid-template-columns:minmax(0,1.45fr) minmax(320px,.8fr);gap:18px}.arena-card{padding:12px}.arena-wrap{position:relative;height:min(74vh,760px);min-height:520px;border-radius:24px;overflow:hidden;background:linear-gradient(180deg,#2c1c5c 0%,#17102f 34%,#090d22 100%);border:1px solid rgba(255,255,255,.12)}
@media(max-width:980px){.match-screen{grid-template-columns:1fr}.arena-wrap{height:540px;min-height:460px}}
.arena-crowd{position:absolute;inset:24px 0 auto;height:130px;background:radial-gradient(circle at center,rgba(255,255,255,.08),transparent 48%)}
.crowd-dots{position:absolute;inset:16px 0 auto;height:120px;opacity:.7}
.crowd-dots i{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--dot,#ffd46b);box-shadow:0 0 14px var(--dot,#ffd46b)}
.light-beam{position:absolute;top:-16px;width:28%;height:66%;opacity:.42;background:linear-gradient(180deg,rgba(255,255,255,.52),rgba(255,255,255,.02) 70%);clip-path:polygon(40% 0,60% 0,100% 100%,0 100%)}
.light-beam.left{left:10%;transform:rotate(-8deg)}.light-beam.right{right:10%;transform:rotate(8deg)}
.titantron{position:absolute;left:50%;top:18px;transform:translateX(-50%);width:min(520px,74%);padding:12px 20px;border-radius:20px;background:linear-gradient(135deg,rgba(255,79,216,.35),rgba(105,230,255,.2));border:1px solid rgba(255,255,255,.18);text-align:center;box-shadow:0 0 30px rgba(255,79,216,.18)}
.titantron .main{font-size:clamp(24px,3vw,42px);font-weight:1000;letter-spacing:.05em}.titantron .sub{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:800}
.ring-stage{position:absolute;left:7%;right:7%;bottom:30px;height:330px}.ring-canvas-floor{position:absolute;inset:auto 0 0;height:120px;background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.03));border-radius:22px;transform:perspective(840px) rotateX(62deg)}
.ring-apron{position:absolute;left:7%;right:7%;bottom:0;height:88px;background:linear-gradient(180deg,#2a2d8e,#101443);border-radius:0 0 24px 24px}
.ring-mat{position:absolute;left:11%;right:11%;bottom:56px;height:180px;border-radius:20px;background:linear-gradient(180deg,#e9eaff,#c7d1ff);box-shadow:0 0 0 10px #5370ff,0 0 0 18px #202866,0 18px 34px rgba(0,0,0,.35);overflow:hidden}
.ring-mat::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,255,255,.22),transparent 24%,transparent 76%,rgba(255,255,255,.15))}
.ring-logo{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-weight:1000;color:rgba(45,42,116,.18);letter-spacing:.16em;font-size:clamp(22px,3vw,42px)}
.rope{position:absolute;left:13%;right:13%;height:8px;border-radius:999px;box-shadow:0 0 0 2px rgba(255,255,255,.1)}.rope.r1{bottom:218px;background:#ff6a88}.rope.r2{bottom:190px;background:#ffd46b}.rope.r3{bottom:162px;background:#69e6ff}
.post{position:absolute;bottom:44px;width:16px;height:190px;background:linear-gradient(180deg,#8de6ff,#40a9ff);box-shadow:0 0 0 4px #25327b}.post.left{left:11%}.post.right{right:11%}
.steps{position:absolute;left:4%;bottom:18px;width:64px;height:54px;border-radius:8px;background:linear-gradient(180deg,#c8c9dd,#6f7490);box-shadow:0 10px 18px rgba(0,0,0,.28)}
.entrance-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at center,rgba(7,9,24,.22),rgba(6,8,18,.84));backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .4s ease}.entrance-overlay.show{opacity:1;pointer-events:auto}
.entrance-screen{width:min(86%,1040px);height:min(78%,700px);position:relative;overflow:hidden;border-radius:28px;background:linear-gradient(180deg,#25105d,#100827);border:1px solid rgba(255,255,255,.14);box-shadow:var(--shadow)}
.entrance-bg{position:absolute;inset:0;background:radial-gradient(circle at center top,rgba(255,255,255,.18),transparent 24%),linear-gradient(180deg,rgba(255,255,255,.06),transparent 26%),linear-gradient(180deg,#24115a,#100827 55%,#0b0d20)}
.pyro{position:absolute;bottom:110px;width:150px;height:260px;filter:blur(.2px);opacity:0;animation:pyro 1.8s ease-in-out infinite}.pyro.left{left:8%}.pyro.right{right:8%}.entrance-overlay.show .pyro{opacity:.9}
.pyro::before,.pyro::after{content:"";position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:8px;height:180px;background:linear-gradient(180deg,transparent,var(--pyro,#ff4fd8) 34%,#fff 60%,transparent);clip-path:polygon(50% 0,72% 16%,100% 100%,0 100%,28% 16%)}
.pyro::after{height:220px;width:12px;opacity:.66;filter:blur(8px)}
@keyframes pyro{0%,100%{transform:scaleY(.75) translateY(10px)}50%{transform:scaleY(1.08) translateY(-6px)}}
.entrance-runway{position:absolute;left:39%;right:39%;top:88px;bottom:90px;border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.24),rgba(255,255,255,.06));box-shadow:0 0 0 2px rgba(255,255,255,.08),0 0 30px rgba(255,79,216,.18)}
.entrance-nameplate{position:absolute;left:28px;right:28px;bottom:24px;padding:16px 18px;border-radius:22px;background:linear-gradient(135deg,rgba(255,79,216,.24),rgba(105,230,255,.14));border:1px solid rgba(255,255,255,.16);display:flex;justify-content:space-between;align-items:flex-end;gap:12px}
.entrance-nameplate .name{font-size:clamp(30px,4vw,54px);font-weight:1000;line-height:.9}.entrance-nameplate .tag{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:800}.entrance-nameplate .quote{max-width:48%;color:var(--muted)}
.commentary{max-height:220px;overflow:auto;padding-right:4px}.comment{padding:10px 12px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);margin-bottom:8px}.comment b{display:block;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.log{max-height:240px;overflow:auto}.log-entry{padding:9px 10px;border-radius:14px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.08);margin-bottom:8px}
.hud-grid{display:grid;grid-template-columns:1fr;gap:12px}.wbox{padding:12px;border-radius:18px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}
.match-controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.action-banner{position:absolute;left:50%;top:94px;transform:translateX(-50%);padding:12px 18px;border-radius:999px;background:rgba(5,8,22,.7);border:1px solid rgba(255,255,255,.18);font-weight:1000;letter-spacing:.08em;text-transform:uppercase;box-shadow:0 10px 24px rgba(0,0,0,.28)}
/* Wrestler render */
.wrestler{--skin:#d58c6d;--hair:#22121c;--gear1:#ff4fd8;--gear2:#ffd46b;--eye:#4c2e2b;--lip:#c86a7d;--height:1;--shoulder:1;--waist:1;--hip:1;--poseIdle:0px;position:relative;width:240px;height:490px;transform-origin:bottom center;filter:drop-shadow(0 26px 24px rgba(0,0,0,.32));pointer-events:none}
.wrestler.compact{width:170px;height:340px}.wrestler.mini{width:130px;height:250px}.wrestler .shadow{position:absolute;left:50%;bottom:8px;transform:translateX(-50%);width:120px;height:18px;border-radius:50%;background:rgba(0,0,0,.32);filter:blur(6px)}
.wrestler .body{position:absolute;left:50%;bottom:24px;transform:translateX(-50%) scaleY(var(--height));width:190px;height:430px;animation:idlebob 2.4s ease-in-out infinite}
.wrestler.walk .body{animation:walkbob .7s linear infinite}.wrestler.pose-taunt .body{animation:tauntbob .8s ease-in-out infinite}.wrestler.pose-aerial .body{animation:aerialjump .8s ease-in-out infinite}.wrestler.pose-win .body{animation:winpose 1s ease-in-out infinite alternate}
@keyframes idlebob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}@keyframes walkbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}@keyframes tauntbob{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-8px) rotate(-2deg)}}@keyframes aerialjump{0%,100%{transform:translateY(0)}50%{transform:translateY(-34px)}}@keyframes winpose{0%{transform:translateY(0)}100%{transform:translateY(-12px)}}
.torso-back{position:absolute;left:50%;top:142px;transform:translateX(-50%);width:132px;height:148px;background:linear-gradient(180deg,color-mix(in srgb,var(--gear1) 84%, white 8%),var(--gear1));border-radius:46px 46px 40px 40px;border:5px solid #291233;box-shadow:inset 0 0 0 5px rgba(255,255,255,.08)}
.waist-accent{position:absolute;left:50%;top:252px;transform:translateX(-50%);width:134px;height:26px;background:linear-gradient(90deg,var(--gear2),#fff0b8,var(--gear2));border-radius:16px;border:4px solid #291233}
.neck{position:absolute;left:50%;top:120px;transform:translateX(-50%);width:34px;height:34px;background:var(--skin);border-radius:0 0 14px 14px;border:4px solid #291233;border-top:0}
.head{position:absolute;left:50%;top:54px;transform:translateX(-50%);width:106px;height:124px;border-radius:46px 46px 42px 42px;background:linear-gradient(180deg,color-mix(in srgb,var(--skin) 92%, white 8%),var(--skin));border:5px solid #291233;overflow:hidden;box-shadow:inset 0 -10px 0 rgba(255,255,255,.08)}
.ear{position:absolute;top:110px;width:16px;height:22px;background:var(--skin);border:4px solid #291233;border-radius:12px}.ear.left{left:47px}.ear.right{right:47px}
.hair-back{position:absolute;left:50%;top:34px;transform:translateX(-50%);width:124px;height:164px;background:var(--hair);border-radius:52px 52px 60px 60px;border:5px solid #291233}.hair-front{position:absolute;left:50%;top:36px;transform:translateX(-50%);width:122px;height:60px;background:var(--hair);border-radius:52px 52px 22px 22px;border:5px solid #291233;border-bottom:0}.bangs{position:absolute;left:50%;top:60px;transform:translateX(-50%);width:100px;height:28px;background:var(--hair);clip-path:polygon(0 0,100% 0,88% 58%,70% 36%,52% 62%,34% 34%,16% 56%)}
.eye{position:absolute;top:98px;width:20px;height:12px;border-radius:12px;background:#fff;border:3px solid #291233;border-top-width:4px;overflow:hidden}.eye.left{left:84px}.eye.right{right:84px}.iris{position:absolute;left:5px;top:1px;width:8px;height:8px;border-radius:50%;background:var(--eye)}.lash{position:absolute;top:-6px;left:-2px;right:-2px;height:8px;border-top:3px solid #291233;border-radius:999px}
.brow{position:absolute;top:86px;width:24px;height:6px;border-top:4px solid #291233;border-radius:999px}.brow.left{left:82px;transform:rotate(-10deg)}.brow.right{right:82px;transform:rotate(10deg)}
.nose{position:absolute;left:50%;top:112px;transform:translateX(-50%);width:16px;height:20px;border-right:4px solid rgba(41,18,51,.3);border-bottom:4px solid rgba(41,18,51,.22);border-radius:0 0 12px 12px}.mouth{position:absolute;left:50%;top:138px;transform:translateX(-50%);width:34px;height:12px;border-radius:0 0 16px 16px;background:var(--lip);box-shadow:0 -2px 0 rgba(255,255,255,.3) inset}
.blush{position:absolute;top:132px;width:20px;height:10px;border-radius:999px;background:rgba(255,155,160,.24);filter:blur(2px)}.blush.left{left:74px}.blush.right{right:74px}
.arm{position:absolute;top:156px;width:40px;height:144px;background:var(--skin);border:5px solid #291233;border-radius:22px;transform-origin:top center;box-shadow:inset 0 -8px 0 rgba(255,255,255,.08)}.arm.left{left:24px;transform:rotate(12deg)}.arm.right{right:24px;transform:rotate(-12deg)}.wrestler.pose-strike .arm.right{transform:rotate(-54deg) translate(10px,-10px)}.wrestler.pose-grapple .arm.left{transform:rotate(30deg) translate(8px,-8px)}.wrestler.pose-taunt .arm.left{transform:rotate(-28deg) translate(-4px,-24px)}.wrestler.pose-taunt .arm.right{transform:rotate(28deg) translate(4px,-24px)}.wrestler.pose-win .arm.left{transform:rotate(-38deg) translate(-10px,-26px)}.wrestler.pose-win .arm.right{transform:rotate(38deg) translate(10px,-26px)}
.glove{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:36px;height:26px;border-radius:14px;background:var(--gear2);border:4px solid #291233}

<body>
<div class="header">
  <div class="brand">
    <h1>CROWN CIRCUIT</h1>
    <p>Queens of the Ring • Women's League Career RPG</p>
  </div>
  <div class="crown-badge">♛</div>
</div>
<div class="mobile-hint"><div class="notice">iPhone ready: host this folder online, open it in Safari, then use Share → Add to Home Screen. This version focuses on a polished women's-only league with improved entrances, visuals, and animation.</div></div>
<main id="app"></main>
<script>
const app=document.getElementById('app');

const promotionName='Crown Circuit';
const belts=[
  {id:'spotlight',name:'Spotlight Crown',prestige:18},
  {id:'allstar',name:'All-Star Tiara Championship',prestige:34},
  {id:'velocity',name:'Velocity Queens Title',prestige:48},
  {id:'legacy',name:'Legacy Empress Championship',prestige:72},
  {id:'world',name:'Crown Circuit World Championship',prestige:92}
];

const rivals=[
  {name:'Sable Vixen',style:'Showboat',power:14,charisma:22,tech:12,rep:28,catchphrase:'Spotlight first, questions later.',look:{skin:'#d79a76',hair:'#23101b',gear1:'#ff4fd8',gear2:'#ffe1a8',eye:'#4c2e2b',lip:'#d36988',bodyType:'curvy',hairStyle:'longwave',face:'soft',makeup:'glam',outfit:'skirt',entrancePose:'diva',pyro:'#ff4fd8',theme:'Velvet Bloom'}} ,
  {name:'Kara Steel',style:'Powerhouse',power:24,charisma:10,tech:12,rep:34,catchphrase:'I bend steel and break crowns.',look:{skin:'#9d6446',hair:'#201312',gear1:'#466bff',gear2:'#69e6ff',eye:'#362016',lip:'#8f4f5b',bodyType:'power',hairStyle:'ponytail',face:'fierce',makeup:'smoky',outfit:'shorts',entrancePose:'hero',pyro:'#69e6ff',theme:'Titan Heart'}} ,
  {name:'Mina Mirage',style:'High Flyer',power:12,charisma:17,tech:18,rep:30,catchphrase:'Catch the flash if you can.',look:{skin:'#f2c09c',hair:'#47261d',gear1:'#9f59ff',gear2:'#ffcf5e',eye:'#4c332d',lip:'#bf7180',bodyType:'lean',hairStyle:'bob',face:'soft',makeup:'glam',outfit:'bodysuit',entrancePose:'salute',pyro:'#ffcf5e',theme:'Star Dash'}} ,
  {name:'Bianca Vale',style:'Technician',power:13,charisma:13,tech:24,rep:38,catchphrase:'Every hold has a lesson.',look:{skin:'#6e4838',hair:'#0f0b14',gear1:'#1fce8a',gear2:'#9effe0',eye:'#241919',lip:'#95525d',bodyType:'lean',hairStyle:'braids',face:'fierce',makeup:'smoky',outfit:'shorts',entrancePose:'hero',pyro:'#67ffbd',theme:'Emerald Lock'}} ,
  {name:'Nova Luxe',style:'Showboat',power:15,charisma:24,tech:14,rep:46,catchphrase:'The universe watches me shine.',look:{skin:'#c77963',hair:'#2c1228',gear1:'#ff5d94',gear2:'#ffd46b',eye:'#45222b',lip:'#d26f8f',bodyType:'curvy',hairStyle:'crown',face:'soft',makeup:'glam',outfit:'skirt',entrancePose:'diva',pyro:'#ffd46b',theme:'Royal Stardust'}} ,
  {name:'Rhea Tempest',style:'Brawler',power:21,charisma:14,tech:15,rep:42,catchphrase:'Hear the storm before I strike.',look:{skin:'#8b5f4a',hair:'#1b1019',gear1:'#ff6a88',gear2:'#72dfff',eye:'#351f1d',lip:'#ac6270',bodyType:'power',hairStyle:'ponytail',face:'fierce',makeup:'warpaint',outfit:'bodysuit',entrancePose:'hero',pyro:'#ff6a88',theme:'Storm Siren'}}
];

const stories=[
  {id:'spotlight',title:'Spotlight Test',desc:'Win your TV debut and prove you belong in the league.',reward:'Reputation +8, Fans +6'},
  {id:'rivalry',title:'Velvet Rivalry',desc:'Trade words and blows with a rising star to unlock better matches.',reward:'Morale +5, Money +30'},
  {id:'contender',title:'Road to the Tiara',desc:'Beat a ranked rival to earn a title eliminator.',reward:'Reputation +12, Fans +10'}
];

const matchTypes={
  showcase:{id:'showcase',name:'Showcase Singles',desc:'Balanced TV-style exhibition with entrances and crowd work.',rounds:14,speed:1200,tvTitle:"Women's Showcase",bias:'balanced'},
  sprint:{id:'sprint',name:'Sprint Showcase',desc:'Fast-paced showcase built around speed and bursts of offense.',rounds:10,speed:900,tvTitle:'Sprint Showcase',bias:'aerial'},
  clinic:{id:'clinic',name:'Technical Clinic',desc:'A showcase built around counters, smooth transitions, and ring craft.',rounds:16,speed:1100,tvTitle:'Technical Clinic',bias:'technical'},
  power:{id:'power',name:'Power Spotlight',desc:'A heavier-hitting match built on slams and ring control.',rounds:12,speed:1200,tvTitle:'Power Spotlight',bias:'power'},
  iron:{id:'iron',name:'Iron Woman Showcase',desc:'Long-form television attraction highlighting endurance and drama.',rounds:20,speed:1000,tvTitle:'Iron Woman Showcase',bias:'endurance'},
  spectacle:{id:'spectacle',name:'Main Event Spectacle',desc:'Big-match presentation with maximum pageantry and momentum swings.',rounds:15,speed:1050,tvTitle:'Main Event Spectacle',bias:'showcase'}
};

const defaultLook={
  bodyType:'curvy',hairStyle:'longwave',face:'soft',makeup:'glam',outfit:'skirt',entrancePose:'diva',accessory:'tiara',
  gear1:'#ff4fd8',gear2:'#ffd46b',skin:'#d58c6d',hair:'#25151d',eye:'#3d2430',lip:'#cc7185',pyro:'#ff4fd8',theme:'Velvet Surge',nickname:'The Crownfire',banner:'Bow down when the lights hit!',height:100
};

const defaultState={screen:'create',week:1,money:120,arena:'Starlight Dome',ownedBelts:[],completedStories:[],log:[],commentary:[],wrestler:null,currentMatch:null};
let state=loadState();
if(!state || typeof state!=='object') state=structuredClone(defaultState);
let matchInterval=0, entranceTimer=0;

function saveState(){localStorage.setItem('crownCircuitSave',JSON.stringify(state))}
function loadState(){try{return JSON.parse(localStorage.getItem('crownCircuitSave'))||structuredClone(defaultState)}catch(e){return structuredClone(defaultState)}}
function reset(){localStorage.removeItem('crownCircuitSave');stopAll();state=structuredClone(defaultState);render()}
function stopAll(){if(matchInterval) clearInterval(matchInterval); if(entranceTimer) clearInterval(entranceTimer); matchInterval=0; entranceTimer=0;}
function addLog(t){state.log.unshift(`Week ${state.week}: ${t}`); state.log=state.log.slice(0,120); saveState();}
function total(w=state.wrestler){return w.power+w.charisma+w.tech+Math.floor(w.rep/4)}
function styleMoves(style){return {
  'High Flyer':['Halo Kick','Meteor Drop','Starline Moonsault','Comet Crush'],
  'Powerhouse':['Queenbreaker Slam','Royal Bomb','Titan Press','Crown Collapse'],
  'Technician':['Silk Snare','Ivory Lock','Velvet Switch','Tiara Takedown'],
  'Brawler':['Flash Riot','Thunder Palm','Backstage Blitz','Storm Crash'],
  'Showboat':['Encore Kiss','Spotlight Twist','Red Carpet Drop','Finale Fever']
}[style]||['Signature Strike','Grande Finale']}

function choiceChip(key,val,group,current,label=val){return `<button class="choice-chip ${current===val?'active':''}" onclick="setChoice('${group}','${val}')">${label}</button>`}
function setChoice(group,val){const el=document.querySelector(`[data-group="${group}"]`);if(el)el.value=val; previewLook()}
function statBlock(name,val,max){return `<div class="stat"><b><span>${name}</span><span>${val}/${max}</span></b><div class="bar"><div class="fill" style="width:${Math.max(0,Math.min(100,val/max*100))}%"></div></div></div>`}
function miniStat(name,val){return `<div class="row"><div><b>${name}</b><div class="small">Current rating</div></div><div class="pill">${val}</div></div>`}
function allRoster(includePlayer=true){return [ ...(includePlayer&&state.wrestler?[state.wrestler]:[]), ...rivals ]}
function byName(name){return allRoster(true).find(w=>w.name===name)||rivals.find(w=>w.name===name)}
function actorOverall(a){return a.power+a.charisma+a.tech+Math.floor((a.rep||0)/4)}

function wrestlerFigure(w,cls=''){const look=w.look||w;const compact=cls.includes('compact')?'compact':cls.includes('mini')?'mini':'';return `<div class="wrestler ${cls} bodytype-${look.bodyType||'curvy'} hair-${look.hairStyle||'longwave'} face-${look.face||'soft'} makeup-${look.makeup||'glam'} outfit-${look.outfit||'skirt'} accessory-${look.accessory||'none'} entrance-pose-${look.entrancePose||'diva'}" style="--skin:${look.skin};--hair:${look.hair};--gear1:${look.gear1};--gear2:${look.gear2};--eye:${look.eye};--lip:${look.lip};--height:${(look.height||100)/100};--shoulder:1;--waist:1;--hip:1">
      <div class="shadow"></div>
      <div class="body ${compact}">
        <div class="hair-back"></div><div class="ear left"></div><div class="ear right"></div><div class="head"><div class="bangs"></div><div class="eye left"><div class="lash"></div><div class="iris"></div></div><div class="eye right"><div class="lash"></div><div class="iris"></div></div><div class="brow left"></div><div class="brow right"></div><div class="nose"></div><div class="mouth"></div><div class="blush left"></div><div class="blush right"></div></div><div class="hair-front"></div><div class="tiara"></div>
        <div class="neck"></div>
        <div class="torso-back"></div><div class="jacket"></div><div class="pattern"></div><div class="waist-accent"></div><div class="shorts"></div><div class="skirt"></div>
        <div class="arm left"><div class="glove"></div></div><div class="arm right"><div class="glove"></div></div>
        <div class="leg left"><div class="boot left"></div></div><div class="leg right"><div class="boot right"></div></div>
      </div>
    </div>`}

function render(){stopAll(); if(!state.wrestler || state.screen==='create') return renderCreate(); if(state.screen==='match') return renderMatch(); renderGame(state.screen||'home')}

function renderCreate(){
  const look=state.wrestler?.look||structuredClone(defaultLook);
  app.innerHTML=`<section class="hero-grid">
    <section class="card">
      <div class="panel-title"><div><h2>Create Your Queen</h2><div class="small">A women's only wrestling league with deep presentation, customization, and TV-style exhibition matches.</div></div><div class="footer-actions"><button class="secondary" onclick="loadExisting()">Load Save</button><button class="danger" onclick="reset()">Clear Save</button></div></div>
      <div class="notice"><b>${promotionName}</b> is an all-women sports entertainment league. Build an eye-catching rookie with detailed customization for body, hair, face, outfit, accessories, and entrance style — then watch her in televised showcases and exhibitions.</div>
      <div class="tabs">
        <button class="tab-btn active" data-tab="identity" onclick="switchTab('identity',this)">Identity</button>
        <button class="tab-btn secondary" data-tab="body" onclick="switchTab('body',this)">Body</button>
        <button class="tab-btn secondary" data-tab="face" onclick="switchTab('face',this)">Face & Hair</button>
        <button class="tab-btn secondary" data-tab="outfit" onclick="switchTab('outfit',this)">Outfit</button>
        <button class="tab-btn secondary" data-tab="entrance" onclick="switchTab('entrance',this)">Entrance</button>
      </div>

      <div class="tab-panel active" id="tab-identity">
        <div class="grid two">
          <div><label>Ring Name</label><input id="name" value="Ava Allure" oninput="previewLook()"></div>
          <div><label>Nickname</label><input id="nickname" value="${look.nickname}" oninput="previewLook()"></div>
          <div><label>Hometown</label><input id="home" value="Las Vegas, NV" oninput="previewLook()"></div>
          <div><label>Style</label><select id="style" onchange="previewLook()"><option>Showboat</option><option>High Flyer</option><option>Technician</option><option>Powerhouse</option><option>Brawler</option></select></div>
          <div><label>Catchphrase</label><input id="catch" value="All eyes on the crown." oninput="previewLook()"></div>
          <div><label>Entrance Theme Name</label><input id="theme" value="${look.theme}" oninput="previewLook()"></div>
        </div>
        <label style="margin-top:12px">Banner Line</label>
        <textarea id="banner" oninput="previewLook()">${look.banner}</textarea>
      </div>

      <div class="tab-panel" id="tab-body">
        <div class="grid two">
          <div>
            <label>Body Type</label>
            <input type="hidden" id="bodyType" data-group="bodyType" value="${look.bodyType}">
            <div class="choice-grid">${['curvy','lean','power'].map(v=>choiceChip('bodyType',v,'bodyType',look.bodyType,v[0].toUpperCase()+v.slice(1))).join('')}</div>
          </div>
          <div>
            <label>Outfit Base</label>
            <input type="hidden" id="outfit" data-group="outfit" value="${look.outfit}">
            <div class="choice-grid">${[['skirt','Skirt Gear'],['shorts','Shorts Gear'],['bodysuit','Bodysuit'],['jacket','Jacket Set'],['idol','Idol Skirt']].map(([v,l])=>choiceChip('outfit',v,'outfit',look.outfit,l)).join('')}</div>
          </div>
        </div>
        <div class="grid two" style="margin-top:12px">
          <div><label>Height Presence</label><input id="height" type="range" min="92" max="108" value="${look.height}" oninput="previewLook()"><div class="small">Controls visual height and ring presence.</div></div>
          <div><label>Skin Tone</label><input id="skin" type="color" value="${look.skin}" oninput="previewLook()"></div>
        </div>
      </div>

      <div class="tab-panel" id="tab-face">
        <div class="grid two">
          <div>
            <label>Hair Style</label>
            <input type="hidden" id="hairStyle" data-group="hairStyle" value="${look.hairStyle}">
            <div class="choice-grid">${[['longwave','Long Wave'],['ponytail','Ponytail'],['bob','Bob'],['braids','Braids'],['bun','Classic Bun'],['crown','Volume Crown']].map(([v,l])=>choiceChip('hairStyle',v,'hairStyle',look.hairStyle,l)).join('')}</div>
          </div>
          <div>
            <label>Face Mood</label>
            <input type="hidden" id="face" data-group="face" value="${look.face}">
            <div class="choice-grid">${[['soft','Soft Glam'],['fierce','Fierce'],['regal','Regal']].map(([v,l])=>choiceChip('face',v,'face',look.face,l)).join('')}</div>
          </div>
          <div><label>Hair Color</label><input id="hair" type="color" value="${look.hair}" oninput="previewLook()"></div>
          <div><label>Eye Color</label><input id="eye" type="color" value="${look.eye}" oninput="previewLook()"></div>
          <div><label>Lip Color</label><input id="lip" type="color" value="${look.lip}" oninput="previewLook()"></div>
          <div>
            <label>Makeup</label>
            <input type="hidden" id="makeup" data-group="makeup" value="${look.makeup}">
            <div class="choice-grid">${[['glam','Glam'],['smoky','Smoky'],['warpaint','War Paint']].map(([v,l])=>choiceChip('makeup',v,'makeup',look.makeup,l)).join('')}</div>
          </div>
        </div>
      </div>

      <div class="tab-panel" id="tab-outfit">
        <div class="grid two">
          <div><label>Primary Outfit Color</label><input id="gear1" type="color" value="${look.gear1}" oninput="previewLook()"></div>
          <div><label>Accent Color</label><input id="gear2" type="color" value="${look.gear2}" oninput="previewLook()"></div>
          <div><label>Pyro / Lighting Color</label><input id="pyro" type="color" value="${look.pyro}" oninput="previewLook()"></div>
          <div><label>Entrance Nameplate Alias</label><input id="alias" value="Main Event Muse" oninput="previewLook()"></div>
        </div>
        <div style="margin-top:12px">
          <label>Accessory Piece</label>
          <input type="hidden" id="accessory" data-group="accessory" value="${look.accessory||'tiara'}">
          <div class="choice-grid">${[['tiara','Tiara'],['jacket','Entrance Jacket'],['none','None']].map(([v,l])=>choiceChip('accessory',v,'accessory',look.accessory||'tiara',l)).join('')}</div>
        </div>
      </div>

      <div class="tab-panel" id="tab-entrance">
        <div class="grid two">
          <div>
            <label>Entrance Pose</label>
            <input type="hidden" id="entrancePose" data-group="entrancePose" value="${look.entrancePose}">
            <div class="choice-grid">${[['diva','Diva Flourish'],['salute','Heroic Salute'],['hero','Champion Raise'],['strut','Spotlight Strut']].map(([v,l])=>choiceChip('entrancePose',v,'entrancePose',look.entrancePose,l)).join('')}</div>
          </div>
          <div><label>Entrance Spotlight Color</label><input id="spot" type="color" value="${look.pyro}" oninput="previewLook()"></div>
        </div>
        <div class="notice" style="margin-top:12px">Entrances in Crown Circuit are part runway, part fight night spectacle — the preview shows your walk-out look, spotlight tone, pyro color, and pose style.</div>
      </div>

      <div class="footer-actions" style="margin-top:18px"><button onclick="startCareer()">Sign with ${promotionName}</button></div>
    </section>

    <section class="hero-stage">

function previewLook(){
  const name=document.getElementById('name')?.value||'Ava Allure';
  const style=document.getElementById('style')?.value||'Showboat';
  const home=document.getElementById('home')?.value||'Las Vegas, NV';
  const look=currentLookFromInputs();
  const stack=document.getElementById('previewStack');
  if(stack) stack.innerHTML=wrestlerFigure({look},`walk walk-cycle entrance-pose-${look.entrancePose}`);
  const pName=document.getElementById('previewName'); if(pName) pName.textContent=name;
  const pAlias=document.getElementById('previewAlias'); if(pAlias) pAlias.textContent=look.nickname;
  const pMeta=document.getElementById('previewMeta'); if(pMeta) pMeta.textContent=`${style} • ${home}`;
  const pBanner=document.getElementById('previewBanner'); if(pBanner) pBanner.textContent=look.banner;
  const pTheme=document.getElementById('previewTheme'); if(pTheme) pTheme.textContent=look.theme;
  const spotL=document.getElementById('previewLightL'), spotR=document.getElementById('previewLightR');
  if(spotL){spotL.style.background=`linear-gradient(180deg, ${hexToRgba(document.getElementById('spot')?.value||look.pyro,.48)}, transparent 72%)`;spotR.style.background=spotL.style.background}

    const txt=ch.getAttribute('onclick');

    const [,group,val]=m; const current=document.getElementById(group)?.value; ch.classList.toggle('active',current===val);
  });
}

function hexToRgba(hex,a){const c=(hex||'#ffffff').replace('#','');const n=parseInt(c.length===3?c.split('').map(x=>x+x).join(''):c,16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`}

function startCareer(){

  if(style==='Showboat') base={power:11,charisma:21,tech:11};

function train(stat,cost,plus,name){const w=state.wrestler;if(stat!=='stamina' && w.stamina<cost) return alert('Too tired. Rest or use the Recovery Lounge.'); if(stat==='stamina'){w.stamina=Math.min(100,w.stamina+plus);w.morale=Math.min(100,w.morale+10); addLog(`${w.name} recovered in the ${name}.`)} else {w[stat]+=plus; w.stamina=Math.max(0,w.stamina-cost); w.rep=Math.min(130,w.rep+1); addLog(`${w.name} trained at the ${name} and improved ${stat}.`)} state.week++; saveState(); renderGame('training')}
function restWeek(){const w=state.wrestler; w.stamina=Math.min(100,w.stamina+24); w.morale=Math.min(100,w.morale+12); state.week++; addLog(`${w.name} rested, studied tape, and returned refreshed.`); saveState(); renderGame('home')}
function playStory(id){if(state.completedStories.includes(id)) return; const w=state.wrestler; const s=stories.find(x=>x.id===id); if(!s) return; state.completedStories.push(id); w.rep=Math.min(130,w.rep+8); w.fans+=6; w.morale=Math.min(100,w.morale+5); state.money+=30; state.week++; addLog(`${w.name} completed storyline: ${s.title}.`); saveState(); renderGame('story')}

function buildMatch(a,b,rule,opts={}){return {phase:'entrance',banner:rule.name,player:actorFromWrestler(a,!!opts.isPlayer,opts.leftTag||'BLUE'),foe:actorFromWrestler(b,false,opts.rightTag||'RED'),opponentName:b.name,time:0,round:1,log:[`${a.name} and ${b.name} are set for ${rule.name.toLowerCase()}.`],comments:[{by:'Iris Vale',text:`Tonight's ${rule.name.toLowerCase()} features ${a.name} and ${b.name} in the women's division spotlight.`},{by:'Cass Monroe',text:`Expect style, athleticism, and plenty of showmanship once these two hit the ring.`}],result:null,careerMode:!!opts.careerMode,returnTab:opts.returnTab||'home',matchRule:rule,tvTitle:opts.tvTitle||rule.tvTitle,showNote:opts.showNote||rule.desc};}

function startExhibition(){const a=document.getElementById('exA')?.value,b=document.getElementById('exB')?.value,type=document.getElementById('exType')?.value||'showcase'; if(!a||!b) return; if(a===b) return alert('Choose two different athletes for the exhibition.'); const wa=byName(a), wb=byName(b); if(!wa||!wb) return; const rule=matchTypes[type]||matchTypes.showcase; state.currentMatch=buildMatch(wa,wb,rule,{careerMode:false,isPlayer:false,leftTag:'BLUE',rightTag:'RED',returnTab:'exhibition',tvTitle:`TV Exhibition • ${rule.name}`}); state.screen='match'; saveState(); renderMatch(); startEntranceSequence()}

function setBanner(t){state.currentMatch.banner=t; const b=document.getElementById('actionBanner'); if(b) b.textContent=t}
function refreshHUD(){const card=document.querySelector('.hud-grid'); if(card){const m=state.currentMatch; card.innerHTML=hudBox(m.player)+hudBox(m.foe)}}
function refreshFighters(){const m=state.currentMatch; const left=document.querySelector('#fighterLeft .wrestler'), right=document.querySelector('#fighterRight .wrestler'); if(left){left.className=`wrestler compact bodytype-${m.player.look.bodyType} hair-${m.player.look.hairStyle} face-${m.player.look.face} makeup-${m.player.look.makeup} outfit-${m.player.look.outfit} accessory-${m.player.look.accessory||'none'} ${poseClass(m.player.pose)}`; left.parentElement.style.left=m.player.x+'%'; left.style.setProperty('--skin',m.player.look.skin); left.style.setProperty('--hair',m.player.look.hair); left.style.setProperty('--gear1',m.player.look.gear1); left.style.setProperty('--gear2',m.player.look.gear2); left.style.setProperty('--eye',m.player.look.eye); left.style.setProperty('--lip',m.player.look.lip); left.style.setProperty('--height',(m.player.look.height||100)/100)} if(right){right.className=`wrestler compact bodytype-${m.foe.look.bodyType} hair-${m.foe.look.hairStyle} face-${m.foe.look.face} makeup-${m.foe.look.makeup} outfit-${m.foe.look.outfit} accessory-${m.foe.look.accessory||'none'} ${poseClass(m.foe.pose)}`; right.parentElement.style.left=m.foe.x+'%'; right.style.setProperty('--skin',m.foe.look.skin); right.style.setProperty('--hair',m.foe.look.hair); right.style.setProperty('--gear1',m.foe.look.gear1); right.style.setProperty('--gear2',m.foe.look.gear2); right.style.setProperty('--eye',m.foe.look.eye); right.style.setProperty('--lip',m.foe.look.lip); right.style.setProperty('--height',(m.foe.look.height||100)/100)} refreshHUD()}
function poseClass(p){return {idle:'',walk:'walk',strike:'pose-strike',grapple:'pose-grapple',taunt:'pose-taunt',aerial:'pose-aerial',win:'pose-win',down:'pose-grapple'}[p]||''}

function startEntranceSequence(){const overlay=document.getElementById('entranceOverlay'); if(!overlay) return; const m=state.currentMatch; const tag=document.getElementById('entranceTag'), name=document.getElementById('entranceName'), quote=document.getElementById('entranceQuote'), fig=document.getElementById('entranceFigure'), pyroL=document.getElementById('pyroL'),pyroR=document.getElementById('pyroR'); overlay.classList.add('show'); const order=[
    {actor:m.player, by:'Iris Vale', quote:m.player.catchphrase||`${m.player.name} is ready for the spotlight.`, intro:`Making her way to the ring, ${m.player.name}!`},
    {actor:m.foe, by:'Cass Monroe', quote:m.foe.catchphrase||`${m.foe.name} is ready to put on a show.`, intro:`And her opponent, ${m.foe.name}!`}
  ]; let step=0; renderStep();
  function renderStep(){const item=order[step]; if(!item){setTimeout(()=>{overlay.classList.remove('show'); state.currentMatch.phase='match'; state.currentMatch.banner='Bell Rings'; comment('Iris Vale',`The entrances are over and both women are ready to go.`); comment('Cass Monroe',`What a presentation. Now let's see who can back it up with athleticism and timing.`); startMatchLoop();},700); return;} tag.textContent=m.tvTitle; name.textContent=item.actor.name; quote.textContent=item.quote; fig.innerHTML=wrestlerFigure({look:item.actor.look},`compact walk walk-cycle entrance-pose-${item.actor.look.entrancePose}`); pyroL.style.setProperty('--pyro',item.actor.look.pyro); pyroR.style.setProperty('--pyro',item.actor.look.pyro); pushLog(item.intro); comment(item.by,item.intro); step++; entranceTimer=setTimeout(renderStep,m.matchRule?.id==='spectacle'?2600:2200)}
}

function startMatchLoop(){stopAll(); const speed=state.currentMatch?.matchRule?.speed||1200; matchInterval=setInterval(tickMatch,speed)}
function toggleMatch(){if(!matchInterval){startMatchLoop();setBanner('Action Resumes');return} clearInterval(matchInterval); matchInterval=0; setBanner('Paused')}
function skipMatch(){while(state.currentMatch && !state.currentMatch.result){tickMatch(true)}}
function chooseAction(a,b){const bias=state.currentMatch?.matchRule?.bias||'balanced'; if(a.stam<16) return 'recover'; if(a.hp<28 && a.mom>56 && Math.random()<.22) return 'taunt'; if(b.hp<34 && a.mom>62) return Math.random()<.5?'finisher':'pin'; if(bias==='aerial' && Math.random()<.28) return a.style==='Technician'?'counter':'aerial'; if(bias==='technical' && Math.random()<.32) return Math.random()<.58?'counter':'grapple'; if(bias==='power' && Math.random()<.34) return 'grapple'; if(bias==='showcase' && Math.random()<.26) return Math.random()<.5?'taunt':'aerial'; if(bias==='endurance' && a.stam<30) return 'recover'; if(a.style==='High Flyer' && a.mom>54) return Math.random()<.5?'aerial':'strike'; if(a.style==='Technician' && b.stam<50) return Math.random()<.45?'grapple':'counter'; if(a.style==='Powerhouse') return Math.random()<.52?'grapple':'strike'; if(a.style==='Showboat' && a.mom<52) return Math.random()<.42?'taunt':'strike'; if(a.style==='Brawler') return Math.random()<.5?'strike':'grapple'; return ['strike','grapple','counter','taunt'][Math.floor(Math.random()*4)]}
function tickMatch(force=false){const m=state.currentMatch;if(!m || m.result || m.phase!=='match') return; const a1=chooseAction(m.player,m.foe), a2=chooseAction(m.foe,m.player); resolveAction(m.player,m.foe,a1); if(m.result) return; if(Math.random()>.32) resolveAction(m.foe,m.player,a2); m.round++; const rounds=m.matchRule?.rounds||14; if(m.round>rounds && !m.result){const score=(m.player.hp+m.player.mom+actorOverall(m.player)/3)-(m.foe.hp+m.foe.mom+actorOverall(m.foe)/3); endMatch(score>=0?m.player:m.foe,'decision')} refreshFighters()}
function resolveAction(a,b,act){if(state.currentMatch.result) return; const names=styleMoves(a.style); const sig=names[Math.floor(Math.random()*names.length)];
  if(act==='recover'){a.stam=Math.min(100,a.stam+16); a.mom=Math.max(0,a.mom-4); a.pose='idle'; a.action='Recovering'; a.x+=(a===state.currentMatch.player?1:-1); setBanner('Recovery'); pushLog(`${a.name} slows things down and regains composure.`); comment('Cass Monroe',`${a.name} is buying herself precious breathing room.`); return}
  if(act==='taunt'){a.mom=Math.min(100,a.mom+12); a.stam=Math.max(0,a.stam-4); a.pose='taunt'; a.action='Taunting'; setBanner('Crowd Reaction'); pushLog(`${a.name} plays to the crowd and soaks up the moment.`); comment('Iris Vale',`${a.name} knows exactly how to command an arena.`); return}
  if(act==='counter'){const ok=Math.random()<(.45+a.tech/100); a.pose='grapple'; if(ok){const dmg=9+Math.round(a.tech/7); b.hp=Math.max(0,b.hp-dmg); b.stam=Math.max(0,b.stam-8); a.mom=Math.min(100,a.mom+10); b.mom=Math.max(0,b.mom-8); a.action='Counter'; b.pose='down'; setBanner('Counter!'); pushLog(`${a.name} reverses the exchange into a slick counter!`); comment('Iris Vale',`What ring awareness by ${a.name}!`)} else {a.stam=Math.max(0,a.stam-6); pushLog(`${a.name} reaches for a counter but misses the timing.`)} checkFinish(a,b); return}
  if(act==='aerial'){const ok=Math.random()<(.52+a.charisma/100+a.mom/200); a.pose='aerial'; a.stam=Math.max(0,a.stam-16); if(ok){const dmg=15+Math.round(a.charisma/6); b.hp=Math.max(0,b.hp-dmg); b.stam=Math.max(0,b.stam-10); a.mom=Math.min(100,a.mom+14); b.pose='down'; a.action='Aerial Attack'; setBanner(sig); pushLog(`${a.name} launches ${sig} and lands flush!`); comment('Cass Monroe',`That was spectacular and dangerous in the best way.`)} else {a.hp=Math.max(0,a.hp-7); a.mom=Math.max(0,a.mom-8); pushLog(`${a.name} goes airborne but crashes hard on the landing.`); comment('Iris Vale',`High risk means high consequence.`)} checkFinish(a,b); return}
  if(act==='finisher'){const ok=Math.random()<(.56+a.mom/100); a.pose='strike'; a.stam=Math.max(0,a.stam-20); a.action='Finisher'; if(ok){const dmg=22+Math.round((a.power+a.charisma+a.tech)/18); b.hp=Math.max(0,b.hp-dmg); b.mom=Math.max(0,b.mom-18); b.pose='down'; setBanner('Finisher!'); pushLog(`${a.name} unleashes ${sig}, her finishing blow!`); comment('Cass Monroe',`That might be the knockout moment right there.`); if(b.hp<26 || Math.random()<.3) return attemptPin(a,b,true)} else {pushLog(`${a.name} tries for ${sig}, but ${b.name} avoids the kill shot.`); comment('Iris Vale',`${b.name} just dodged disaster.`)} checkFinish(a,b); return}
  if(act==='pin'){attemptPin(a,b,false); return}
  // strike or grapple
  const useGrapple=act==='grapple'; const base=useGrapple?(8+a.power/4+a.tech/6):(6+a.power/5+a.charisma/8); const acc=useGrapple?.66:.78; const ok=Math.random()<acc; a.pose=useGrapple?'grapple':'strike'; a.stam=Math.max(0,a.stam-(useGrapple?12:8)); a.action=useGrapple?'Grapple':'Striking'; a.x+=(a===state.currentMatch.player?1.6:-1.6); if(ok){const dmg=Math.round(base); b.hp=Math.max(0,b.hp-dmg); b.stam=Math.max(0,b.stam-(useGrapple?10:7)); a.mom=Math.min(100,a.mom+(useGrapple?8:6)); b.mom=Math.max(0,b.mom-5); b.pose='down'; setBanner(sig); pushLog(`${a.name} lands ${sig}!`); comment(useGrapple?'Cass Monroe':'Iris Vale', useGrapple?`${a.name} powered through with authority.`:`${a.name} is putting together a sharp sequence.`)} else {pushLog(`${a.name} reaches for a big move, but ${b.name} evades.`)} checkFinish(a,b)
}
function attemptPin(a,b,afterFinisher){a.action='Pinning'; a.pose='grapple'; setBanner('Pin Attempt'); pushLog(`${a.name} hooks the leg for a pin!`); comment('Iris Vale',`Cover! This could be the finish.`); const odds=42+(100-b.hp)*.34+a.mom*.16-b.mom*.1+(afterFinisher?16:0); if(Math.random()*100<odds){endMatch(a,'pinfall')} else {b.mom=Math.min(100,b.mom+12); pushLog(`${b.name} kicks out and keeps the match alive!`); comment('Cass Monroe',`${b.name} refuses to fade under the lights.`)} }
function checkFinish(a,b){if(b.hp<=0) endMatch(a,'knockout'); else if(a.hp<=0) endMatch(b,'knockout')}
function endMatch(winner,method){const m=state.currentMatch; if(m.result) return; m.result={winner:winner.name,method}; clearInterval(matchInterval); matchInterval=0; setBanner(`${winner.name} wins by ${method}!`); winner.pose='win'; const loser=winner===m.player?m.foe:m.player; loser.pose='down'; refreshFighters(); comment('Iris Vale',`${winner.name} stands tall after a polished performance in the women's division spotlight.`); comment('Cass Monroe',`That was entertaining from start to finish — exactly what Crown Circuit wants on television.`); pushLog(`${winner.name} wins by ${method}.`);
  if(m.careerMode && winner===m.player){const w=state.wrestler; const repGain=8+Math.floor((loser.power+loser.charisma+loser.tech)/16); w.rep=Math.min(130,w.rep+repGain); w.fans+=4+Math.floor(repGain/2); w.morale=Math.min(100,w.morale+8); state.money+=28+repGain; if(w.rep>18 && !state.ownedBelts.includes('spotlight')) state.ownedBelts.push('spotlight'); if(w.rep>48 && !state.ownedBelts.includes('allstar')) state.ownedBelts.push('allstar'); if(w.rep>78 && !state.ownedBelts.includes('velocity')) state.ownedBelts.push('velocity'); addLog(`${w.name} defeated ${loser.name} by ${method}, gaining ${repGain} reputation.`); state.week++;}
  else if(m.careerMode){const w=state.wrestler; w.morale=Math.max(40,w.morale-8); addLog(`${w.name} lost to ${winner.name} by ${method}, but remains a featured part of the women's division.`); state.week++;}
  else {addLog(`Exhibition complete: ${winner.name} defeated ${loser.name} by ${method} in a ${m.matchRule.name.toLowerCase()}.`)}
  saveState();
  setTimeout(()=>{alert(`${winner.name} wins by ${method}!`); renderGame(m.returnTab||'home')},800)
}

render();
</script>
